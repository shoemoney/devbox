# Forgejo Actions CI — runs once a runner is registered (act_runner with a
# `linux`/`ubuntu-latest` label). Until then it's inert, no harm.
name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  vet-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./... -race
